name: Desktop Release

# Triggered by pushes to the `release` branch (per Tauri's recommended pipeline)
# or via manual dispatch. tauri-action creates a draft GitHub Release with the
# build artifacts and the `latest.json` updater manifest. Publishing the draft
# is what tells running Workbench instances that a new version is available.
#
# Currently macOS-only — when you want Linux / Windows back, add the matrix
# entries (history of this file in git has the previous shape) and restore
# the platform-specific Install / Smoke / Sign steps.
on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            triple: aarch64-apple-darwin
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            triple: x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Rust toolchain
        # Pin to a specific stable so CI doesn't drift with new releases. Bump
        # this number deliberately when upgrading Tauri major/minor versions.
        # 1.85 is the floor for current Tauri 2.11 + keyring 3 transitive deps.
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.triple }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.triple }}

      - name: Install JS deps
        run: bun install

      - name: Build core (turbo)
        # Tauri's beforeBuildCommand only runs the desktop UI build. The core
        # package is a workspace dependency that must be built first so the
        # `@getworkbench/core/ui` source export resolves cleanly.
        run: bun run --filter=@getworkbench/core build

      - name: Build sidecar binary
        working-directory: apps/desktop
        run: bun run build:sidecar -- --triple ${{ matrix.triple }}

      # Smoke test: the sidecar must emit a `MISSING_REDIS_URL` JSON event on
      # stdout when launched with no `REDIS_URL`. If the binary is broken
      # (cross-compile mismatch, missing libc) this fails fast — much better
      # than discovering it post-release.
      - name: Smoke test sidecar
        working-directory: apps/desktop
        run: |
          bin="dist-sidecar/workbench-sidecar-${{ matrix.triple }}"
          out=$("$bin" < /dev/null 2>&1 | head -1 || true)
          echo "sidecar said: $out"
          echo "$out" | grep -q '"event":"error"' || { echo "Sidecar did not emit a structured error event"; exit 1; }
          echo "$out" | grep -q '"code":"MISSING_REDIS_URL"' || { echo "Sidecar exited with unexpected error code"; exit 1; }

      # Skip the keychain import if APPLE_CERTIFICATE isn't configured —
      # tauri-action will fall back to an unsigned bundle (Gatekeeper warning
      # but builds still produce). Secrets aren't usable in `if:` directly, so
      # we gate via an env var.
      - name: Set up macOS signing keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not set — skipping macOS signing."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm -f cert.p12

      # Sign the bundled sidecar before tauri-action picks it up. We must
      # sign with Hardened Runtime + an entitlements file that allows JIT,
      # otherwise macOS terminates the binary on first launch (and
      # notarisation rejects the outer .app).
      - name: Sign sidecar binary
        if: env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        working-directory: apps/desktop
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements src-tauri/sidecar-entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "dist-sidecar/workbench-sidecar-${{ matrix.triple }}"
          codesign --verify --strict --verbose=2 \
            "dist-sidecar/workbench-sidecar-${{ matrix.triple }}"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — required for the auto-update flow to verify
          # the downloaded bundle before installing it.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarisation. When unset, tauri-action falls
          # back to an unsigned build (Gatekeeper warning on launch).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: desktop-v__VERSION__
          releaseName: "Workbench Desktop v__VERSION__"
          releaseBody: |
            See the [CHANGELOG](https://github.com/pontusab/workbench/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
