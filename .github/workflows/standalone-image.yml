name: Standalone Image

on:
  pull_request:
    paths:
      - "apps/standalone/**"
      - "packages/core/**"
      - "packages/bun/**"
      - "package.json"
      - "bun.lock"
      - ".dockerignore"
      - ".github/workflows/standalone-image.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: standalone-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/workbench-standalone
          tags: |
            type=ref,event=pr
            type=raw,value=ci,enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/standalone/Dockerfile
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
